openapi: 3.0.3
info:
  title: tm-lambda GraphQL API
  description: >
    A GraphQL API that scrapes and exposes Transfermarkt data including players,
    teams, transfers, injuries, market values, coaches, agencies, and academy players.
    All requests are sent as HTTP POST to a single `/api/graphql` endpoint with a
    `query` field in the JSON body.
  version: 1.0.0

servers:
  - url: http://localhost:7071/api
    description: Local Azure Functions runtime

paths:
  /graphql:
    post:
      summary: GraphQL endpoint
      description: >
        Single endpoint for all GraphQL queries. Send a JSON body with a `query`
        string containing your GraphQL query.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/GraphQLRequest'
      responses:
        '200':
          description: Successful GraphQL response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GraphQLResponse'
      x-operations:
        - name: search
          summary: Search for players and teams by name
          requestBody:
            example:
              query: >
                { search(name: "Messi") {
                    players { id name position teamName marketValue }
                    teams { id name countryName marketValue }
                  }
                }
        - name: getPlayer
          summary: Get full player profile by ID and name slug
          requestBody:
            example:
              query: >
                query {
                  getPlayer(id: "28003", name: "lionel-messi") {
                    id name fullName age dateOfBirth position teamName
                    competitionName marketValue marketValueLastUpdate
                    contractExpiration height foot image citizenship
                    nationalTeamName nationalTeamCaps nationalTeamGoals
                    agent agentVerified youthClubs transferFlag
                  }
                }
        - name: getTeam
          summary: Get team squad and seasons info
          requestBody:
            example:
              query: >
                query {
                  getTeam(id: "148", name: "fc-barcelona", season: "2024") {
                    id name leagueName marketValue logo
                    players { id name number position marketValue contractExpiration dateOfBirth }
                    seasons { id name }
                  }
                }
        - name: getPlayerTransfers
          summary: Get all transfer history for a player
          requestBody:
            example:
              query: >
                query {
                  getPlayerTransfers(id: "28003", name: "lionel-messi") {
                    player { id name }
                    transfers { date fromTeamName toTeamName type price marketValue }
                  }
                }
        - name: getInjuries
          summary: Get paginated injury history for a player
          requestBody:
            example:
              query: >
                query {
                  getInjuries(id: "28003", name: "lionel-messi", page: 1) {
                    totalPages
                    player { id name }
                    injuries { season injury from until daysMissed gamesMissed }
                  }
                }
        - name: getMarketValueChanges
          summary: Get market value history for a player
          requestBody:
            example:
              query: >
                query {
                  getMarketValueChanges(id: "28003", name: "lionel-messi") {
                    current highest lastChange highestDate
                    marketValueChanges { date dateISO age marketValue teamName teamId }
                  }
                }
        - name: getAgency
          summary: Get agency details and its represented players
          requestBody:
            example:
              query: >
                query {
                  getAgency(id: "596", name: "represent") {
                    id name phone email website people
                    players { id name teamName marketValue }
                  }
                }
        - name: getCoachCareer
          summary: Get coaching career history for a coach
          requestBody:
            example:
              query: >
                query {
                  getCoachCareer(id: "3566", name: "pep-guardiola") {
                    id name dateOfBirth nationality formation image
                    currentTeam { id name }
                    teamsManaged { role appointed inChargeUntil matches win draw lose ppm team { id name } }
                  }
                }
        - name: getAcademyPlayers
          summary: Get paginated list of academy (youth) players for a club
          requestBody:
            example:
              query: >
                query {
                  getAcademyPlayers(id: "148", name: "fc-barcelona", page: 1) {
                    totalPages
                    players { id name youthTeams ageGroup }
                  }
                }

components:
  schemas:

    GraphQLRequest:
      type: object
      required:
        - query
      properties:
        query:
          type: string
          description: GraphQL query string
          example: '{ search(name: "Messi") { players { id name } } }'
        variables:
          type: object
          description: Optional GraphQL variables map
          additionalProperties: true
      example:
        query: '{ search(name: "Messi") { players { id name position teamName marketValue } } }'

    GraphQLResponse:
      type: object
      properties:
        data:
          type: object
          description: Query result payload; shape depends on the operation
          nullable: true
        errors:
          type: array
          description: List of GraphQL errors, absent when the request succeeds
          items:
            $ref: '#/components/schemas/GraphQLError'
      example:
        data:
          search:
            players:
              - id: '28003'
                name: Lionel Messi
                position: RW
                teamName: Inter Miami CF
                marketValue: '15000000'
              - id: '113586'
                name: Manoel
                position: CB
                teamName: América Futebol Clube (MG)
                marketValue: '100000'
              - id: '449151'
                name: Junior Messias
                position: RW
                teamName: Genoa CFC
                marketValue: '1100000'
              - id: '744024'
                name: João Marcelo
                position: CB
                teamName: Cruzeiro Esporte Clube
                marketValue: '3000000'
              - id: '173617'
                name: Fabrício
                position: CF
                teamName: Esporte Clube São Bento (SP)
                marketValue: '0'
              - id: '1075590'
                name: Rayane Messi
                position: LW
                teamName: NEOM SC
                marketValue: '2800000'
              - id: '1185913'
                name: Pierre Mounguengue
                position: CF
                teamName: Paris Saint-Germain U19
                marketValue: '2000000'
              - id: '13810'
                name: Alexandre Rotweiller
                position: DM
                teamName: null
                marketValue: '0'
              - id: '393581'
                name: Bruno Almeida
                position: RW
                teamName: SC Farense
                marketValue: '350000'
              - id: '76071'
                name: Leandro
                position: LB
                teamName: null
                marketValue: '0'

    GraphQLError:
      type: object
      properties:
        message:
          type: string
        locations:
          type: array
          items:
            type: object
            properties:
              line:
                type: integer
              column:
                type: integer
        path:
          type: array
          items:
            type: string

    # ── Shared primitives ───────────────────────────────────────────────────────

    TeamPreview:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        logo:
          type: string
          nullable: true

    TeamSeasonId:
      type: object
      properties:
        id:
          type: string
        name:
          type: string

    # ── Search ──────────────────────────────────────────────────────────────────

    Search:
      type: object
      properties:
        players:
          type: array
          items:
            $ref: '#/components/schemas/Player'
        teams:
          type: array
          items:
            $ref: '#/components/schemas/SearchTeam'

    SearchTeam:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        countryName:
          type: string
          nullable: true
        marketValue:
          type: integer
          nullable: true

    # ── Player ──────────────────────────────────────────────────────────────────

    Player:
      type: object
      properties:
        version:
          type: integer
        id:
          type: string
          nullable: true
        teamId:
          type: string
          nullable: true
        countryId:
          type: string
          description: Country of the competition, NOT country of the player
          nullable: true
        competitionId:
          type: string
          nullable: true
        competitionName:
          type: string
          nullable: true
        teamName:
          type: string
          nullable: true
        onLoanFromTeamId:
          type: string
          nullable: true
        onLoanFromTeamName:
          type: string
          nullable: true
        number:
          type: string
          nullable: true
        name:
          type: string
          nullable: true
        nameInHomeCountry:
          type: string
          nullable: true
        citizenship:
          type: array
          items:
            type: string
          nullable: true
        nationalTeam:
          type: string
          deprecated: true
          description: "Deprecated — use nationalTeamName instead"
          nullable: true
        nationalTeamId:
          type: string
          nullable: true
        nationalTeamName:
          type: string
          nullable: true
        national:
          $ref: '#/components/schemas/TeamPreview'
          nullable: true
        nationalTeamCaps:
          type: string
          nullable: true
        nationalTeamGoals:
          type: string
          nullable: true
        firstName:
          type: string
          nullable: true
        lastName:
          type: string
          nullable: true
        fullName:
          type: string
          nullable: true
        position:
          type: string
          nullable: true
        image:
          type: string
          nullable: true
        age:
          type: string
          nullable: true
        joinedClub:
          type: string
          nullable: true
        dateOfBirth:
          type: string
          nullable: true
        marketValue:
          type: string
          description: Returns "0" if market value is not defined
          nullable: true
        marketValueLastUpdate:
          type: string
          nullable: true
        contractExpiration:
          type: string
          nullable: true
        transferFlag:
          type: string
          description: Ribbon label such as "New arrival" or "To leave"; null when absent
          nullable: true
        loanExpiration:
          type: string
          nullable: true
        lastContractExtension:
          type: string
          nullable: true
        height:
          type: integer
          nullable: true
        foot:
          type: string
          nullable: true
        agent:
          type: string
          nullable: true
        agentId:
          type: string
          nullable: true
        agentVerified:
          type: boolean
        youthClubs:
          type: string
          nullable: true

    # ── Team ────────────────────────────────────────────────────────────────────

    Team:
      type: object
      properties:
        id:
          type: string
          nullable: true
        name:
          type: string
          nullable: true
        seasons:
          type: array
          items:
            $ref: '#/components/schemas/TeamSeasonId'
        players:
          type: array
          items:
            $ref: '#/components/schemas/SquadPlayer'
          nullable: true
        countryId:
          type: string
          nullable: true
        countryName:
          type: string
          nullable: true
        competitionId:
          type: string
          nullable: true
        leagueId:
          type: string
          nullable: true
        leagueName:
          type: string
          nullable: true
        total_market_value:
          type: number
          format: float
          nullable: true
        market_value_average:
          type: number
          format: float
          nullable: true
        market_value_median:
          type: number
          format: float
          nullable: true
        market_value_70:
          type: number
          format: float
          nullable: true
        market_value_80:
          type: number
          format: float
          nullable: true
        market_value_90:
          type: number
          format: float
          nullable: true
        logo:
          type: string
          nullable: true
        url:
          type: string
          nullable: true

    SquadPlayer:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        number:
          type: string
          nullable: true
        position:
          type: string
          nullable: true
        marketValue:
          type: string
          nullable: true
        contractExpiration:
          type: string
          nullable: true
        description:
          type: string
          nullable: true
        signedFrom:
          $ref: '#/components/schemas/TeamPreview'
          nullable: true
        currentClub:
          $ref: '#/components/schemas/TeamPreview'
          nullable: true
        joinedClub:
          type: string
          nullable: true
        dateOfBirth:
          type: string
          nullable: true

    # ── Transfers ───────────────────────────────────────────────────────────────

    PlayerTransfers:
      type: object
      properties:
        player:
          $ref: '#/components/schemas/Player'
          nullable: true
        transfers:
          type: array
          items:
            $ref: '#/components/schemas/Transfer'
          nullable: true

    Transfer:
      type: object
      properties:
        id:
          type: string
          nullable: true
        date:
          type: string
          nullable: true
        inOrOut:
          type: string
          nullable: true
        fromTeamId:
          type: string
          nullable: true
        fromTeamName:
          type: string
          nullable: true
        toTeamId:
          type: string
          nullable: true
        toTeamName:
          type: string
          nullable: true
        fromLeagueId:
          type: string
          nullable: true
        fromLeagueName:
          type: string
          nullable: true
        toLeagueId:
          type: string
          nullable: true
        toLeagueName:
          type: string
          nullable: true
        type:
          type: string
          nullable: true
        price:
          type: string
          nullable: true
        marketValue:
          type: string
          nullable: true

    # ── Injuries ────────────────────────────────────────────────────────────────

    PlayerInjuries:
      type: object
      properties:
        player:
          $ref: '#/components/schemas/Player'
          nullable: true
        injuries:
          type: array
          items:
            $ref: '#/components/schemas/Injury'
          nullable: true
        totalPages:
          type: integer

    Injury:
      type: object
      properties:
        season:
          type: string
          nullable: true
        injury:
          type: string
          nullable: true
        from:
          type: string
          nullable: true
        until:
          type: string
          nullable: true
        daysMissed:
          type: string
          nullable: true
        gamesMissed:
          type: integer
          nullable: true

    # ── Market Value ────────────────────────────────────────────────────────────

    MarketValueChanges:
      type: object
      properties:
        marketValueChanges:
          type: array
          items:
            $ref: '#/components/schemas/MarketValueChange'
        current:
          type: integer
          nullable: true
        highest:
          type: integer
          nullable: true
        lastChange:
          type: string
          nullable: true
        highestDate:
          type: string
          nullable: true

    MarketValueChange:
      type: object
      properties:
        date:
          type: string
        dateISO:
          type: string
        age:
          type: integer
          nullable: true
        marketValue:
          type: integer
          nullable: true
        teamName:
          type: string
          nullable: true
        teamId:
          type: string
          nullable: true

    # ── Agency ──────────────────────────────────────────────────────────────────

    Agency:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
          nullable: true
        phone:
          type: string
          nullable: true
        email:
          type: string
          nullable: true
        website:
          type: string
          nullable: true
        people:
          type: array
          items:
            type: string
          nullable: true
        players:
          type: array
          items:
            $ref: '#/components/schemas/Player'
          nullable: true

    # ── Coach ───────────────────────────────────────────────────────────────────

    CoachCareer:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
          nullable: true
        dateOfBirth:
          type: string
          nullable: true
        nationality:
          type: string
          nullable: true
        formation:
          type: string
          nullable: true
        image:
          type: string
          nullable: true
        currentTeam:
          $ref: '#/components/schemas/TeamPreview'
          nullable: true
        teamsManaged:
          type: array
          items:
            $ref: '#/components/schemas/ManagedTeam'

    ManagedTeam:
      type: object
      properties:
        team:
          $ref: '#/components/schemas/TeamPreview'
        role:
          type: string
          nullable: true
        appointed:
          type: string
          nullable: true
        inChargeUntil:
          type: string
          nullable: true
        daysInCharge:
          type: integer
          nullable: true
        matches:
          type: integer
          nullable: true
        win:
          type: integer
          nullable: true
        draw:
          type: integer
          nullable: true
        lose:
          type: integer
          nullable: true
        playersUsed:
          type: integer
          nullable: true
        goals:
          type: string
          nullable: true
        ppm:
          type: number
          format: float
          nullable: true

    # ── Academy ─────────────────────────────────────────────────────────────────

    AcademyPlayers:
      type: object
      properties:
        players:
          type: array
          items:
            $ref: '#/components/schemas/AcademyPlayer'
        totalPages:
          type: integer

    AcademyPlayer:
      type: object
      properties:
        id:
          type: string
          nullable: true
        name:
          type: string
          nullable: true
        youthTeams:
          type: integer
          nullable: true
        ageGroup:
          type: integer
          nullable: true
